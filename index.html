<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D1117">
  <title>GODYM NOTE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117; --card: #161B22; --text: #E6EDF3; --text-dim: #7D8590;
      --accent: #FF4444; --border: #30363D; --green: #238636; --font-size: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    #app { display: flex; flex-direction: column; height: 100dvh; }
    .banner { background: var(--accent); color: white; text-align: center; padding: 8px; font-weight: 700; flex-shrink: 0; }
    .banner.sub { font-size: 6px !important; font-weight: 400; letter-spacing: 1.5px; opacity: 0.7; margin-top: 1px; }
    .header { background: var(--card); padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .subject { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .subject span { color: var(--text); font-weight: 700; }
    .icon-btn-sm { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 0; }
    .chapters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .chapters::-webkit-scrollbar { height: 4px; }
    .chapters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chapter-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; font-size: 13px; white-space: nowrap; cursor: pointer; }
    .chapter-btn.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
    .chapter-btn.add { color: var(--green); border-color: var(--green); }
    .editor { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
    .editor-top-bar { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .tool-group { display: flex; gap: 8px; }
    .icon-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 6px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { background: var(--accent); }
    .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .note-wrapper { flex: 1; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-height: 200px; }
    #noteArea { width: 100%; flex: 1; background: transparent; border: none; color: var(--text); font-size: var(--font-size); padding: 16px; resize: none; outline: none; line-height: 1.6; }
    #noteArea::placeholder { color: var(--text-dim); }
    .editor-bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid var(--border); }
    .editor-bottom-bar .tool-group .icon-btn { width: 32px; height: 32px; font-size: 14px; }
    .photos { margin-top: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .photo-item { position: relative; }
    .photos img { width: 100%; border-radius: 6px; border: 1px solid var(--border); display: block; }
    .photo-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; }
    .footer { background: var(--card); border-top: 1px solid var(--border); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    #charCount { font-size: 11px; color: var(--text-dim); }
    #charCount.warn { color: #F0883E; }
    #charCount.danger { color: var(--accent); }
    .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div class="banner">
      GODYM
      <div class="sub">God has You and Me</div>
    </div>
    <div class="header">
      <div class="subject">
        Subject: <span id="subjectName">General</span>
        <button class="icon-btn-sm" id="editSubjectBtn">✏️</button>
      </div>
      <div class="chapters" id="chapters"></div>
    </div>
    <div class="editor">
      <div class="editor-top-bar">
        <div class="tool-group">
          <button class="icon-btn" id="cameraBtn" title="Photo">📷</button>
        </div>
        <div class="tool-group">
          <button class="icon-btn" id="fontDown" title="Font Smaller">A-</button>
          <button class="icon-btn" id="fontUp" title="Font Larger">A+</button>
        </div>
      </div>
      <div class="note-wrapper">
        <textarea id="noteArea" placeholder="Start writing your notes here..."></textarea>
        <div class="editor-bottom-bar">
          <div class="tool-group">
            <button class="icon-btn" id="copyBtn" title="Copy">📋</button>
            <button class="icon-btn" id="editChapterBtn" title="Rename Chapter">✏️</button>
            <button class="icon-btn" id="shareBtn" title="Share">🔗</button>
            <button class="icon-btn" id="saveBtn" title="Save">💾</button>
            <button class="icon-btn" id="deleteBtn" title="Delete Chapter">🗑️</button>
          </div>
        </div>
      </div>
      <div class="photos" id="photos"></div>
    </div>
    <div class="footer">
      <div id="charCount">0 / 50,000 chars</div>
    </div>
  </div> <!-- Heta hi a inkhawp loh kha ka rawn belh chiah e -->
  
  <div class="toast" id="toast"></div>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
  
  <!-- Service Worker Register-na script pawimawh -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Registered!', reg))
          .catch(err => console.log('Service Worker Failed!', err));
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
